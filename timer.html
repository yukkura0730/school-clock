<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Clock Timer V4.1.5</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕒</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Kiwi+Maru:wght@400;700&family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <div id="dynamic-font-link"></div>
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #333333; --accent-color: #00479d;
            --sub-color: #666666; --countdown-color: #d32f2f; --ui-bg: rgba(128, 128, 128, 0.15);
            --modal-content-bg: #ffffff;
            --zoom-factor: 1; /* 動的に変更される変数 */
            --font-family-base: 'BIZ UDPGothic', sans-serif;
        }
        .dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0;
            --sub-color: #aaaaaa; --countdown-color: #ff5252; --ui-bg: rgba(255, 255, 255, 0.1);
            --modal-content-bg: #1e1e1e;
        }
        
        *, *::before, *::after, body, button, input, select, textarea {
            font-family: var(--font-family-base), sans-serif !important;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-10px, -10px); }
            20% { transform: translate(10px, 10px); }
            100% { transform: translate(0,0); }
        }
        .is-exploding #main-display { animation: shake 0.1s infinite; }
        
        #explosion-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999; display: none; background: #000; align-items: center; justify-content: center; cursor: pointer;
        }
        #explosion-video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        #main-display { 
            display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; 
            transition: transform 0.2s ease-out; transform-origin: center;
            transform: scale(var(--zoom-factor));
        }
        
        .large-text { font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
        .small-text { font-weight: 700; color: var(--sub-color); margin: 10px 0; }
        #clock-view, #countdown-view, #manual-timer-view { display: none; flex-direction: column; align-items: center; }
        
        .show-clock #clock-view { display: flex; }
        .show-countdown #countdown-view { display: flex; }
        .show-manual-timer #manual-timer-view { display: flex; }

        #clock-display, #timer-display, #manual-display { font-size: 15rem; border-bottom: 0.05em solid var(--accent-color); }
        #timer-display, #manual-display { border-bottom: none; color: var(--countdown-color); }
        #timer-sub { font-size: 3rem; color: var(--countdown-color); }
        #clock-sub { font-size: 4rem; color: var(--sub-color); }
        #date-area { font-size: 2.5rem; margin-top: 15px; color: var(--sub-color); font-weight: 700; }
        #schedule-label { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; margin-bottom: 5px; }
        
        .ui-container { position: fixed; z-index: 100; display: flex; gap: 10px; }
        #controls-bottom-right { bottom: 20px; right: 20px; flex-direction: column; }
        #settings-trigger-top { top: 20px; right: 20px; }
        
        button, .btn-link {
            cursor: pointer; padding: 12px 18px; border-radius: 10px; border: none;
            background: var(--ui-bg); color: var(--text-color); font-weight: bold;
            text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-accent { background: var(--accent-color); color: white; margin-top: 15px; width: 100%; padding: 15px; border-radius: 10px; font-size: 1.2rem; }
        
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--modal-content-bg); color: var(--text-color); padding: 30px; border-radius: 24px;
            width: 500px; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .setting-section { margin-bottom: 25px; }
        .setting-section h4 { border-left: 5px solid var(--accent-color); padding-left: 12px; margin-bottom: 15px; font-size: 1.1rem; color: var(--accent-color); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .setting-item.vertical { flex-direction: column; align-items: flex-start; }
        .setting-item label { font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; }
        
        input[type="number"], select, textarea, input[type="file"], input[type="range"], input[type="text"] { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--sub-color); 
            background: var(--bg-color); color: inherit; font-size: 1rem;
        }
        input[type="color"] {
            border: none; width: 60px; height: 40px; border-radius: 8px; cursor: pointer; background: none; padding: 0;
        }
        .textarea-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .btn-group-small { display: flex; gap: 5px; }
        .btn-small { padding: 4px 8px; font-size: 0.75rem; border-radius: 6px; background: rgba(128,128,128,0.2); }
        .btn-small-primary { padding: 4px 8px; font-size: 0.75rem; border-radius: 6px; background: var(--accent-color); color: white; }
    </style>
</head>
<body id="body-tag" class="show-clock" onclick="handleBodyClick()">

    <div id="explosion-overlay" onclick="stopExplosion(event)">
        <video id="explosion-video" playsinline onended="stopExplosion()"></video>
    </div>

    <div id="main-display">
        <div id="schedule-label">--</div>
        <div id="clock-view">
            <div id="clock-display" class="large-text">--:--:--</div>
            <div id="timer-sub" class="small-text">次：--:--</div>
        </div>
        <div id="countdown-view">
            <div id="next-label" class="small-text">次のチャイム --:--</div>
            <div id="timer-display" class="large-text">--:--</div>
            <div id="clock-sub" class="small-text">現在時刻 --:--:--</div>
        </div>
        <div id="manual-timer-view">
            <div id="manual-status" class="small-text">汎用タイマーモード</div>
            <div id="manual-display" class="large-text">00:00</div>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <button onclick="setQuickTimer(1)">1分</button>
                    <button onclick="setQuickTimer(5)">5分</button>
                    <button onclick="setQuickTimer(10)">10分</button>
                    <button onclick="resetManualTimer()" style="background:#888; color:white;">消去</button>
                </div>
                <div class="manual-inputs" style="display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 10px;">
                    <input type="number" id="m-input" placeholder="分" min="0" oninput="saveSettings()">
                    <span style="font-weight:bold">分</span>
                    <input type="number" id="s-input" placeholder="秒" min="0" max="59" oninput="saveSettings()">
                    <span style="font-weight:bold">秒</span>
                    <button onclick="startManualTimer()" style="background: var(--accent-color); color: white; padding: 12px 30px; font-size: 1.3rem;">開始</button>
                </div>
            </div>
        </div>
        <div id="date-area">----/--/-- (---)</div>
    </div>

    <div id="settings-trigger-top" class="ui-container">
        <button onclick="openSettings()">⚙️ 設定</button>
    </div>

    <div id="controls-bottom-right" class="ui-container">
        <button onclick="toggleViewMode()">🔄 表示切替</button>
        <button onclick="toggleFullScreen()">🖥️ 全画面</button>
    </div>

    <div id="settings-modal" onclick="closeModalOutside(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color: var(--accent-color); font-size: 1.5rem; margin-bottom: 25px;">⚙️ 環境設定</h3>
            
            <div class="setting-section">
                <h4>📅 スケジュール設定</h4>
                <div class="highlight-box">
                    <div class="setting-item">
                        <label>時間割機能を有効にする</label>
                        <input type="checkbox" id="schedule-enable-check" onchange="saveSettings()">
                    </div>
                    <div class="setting-item">
                        <label>授業モード</label>
                        <select id="current-mode-select" style="width: 100px;" onchange="saveSettings()">
                            <option value="5">5時間</option>
                            <option value="6">6時間</option>
                        </select>
                    </div>
                    <div class="setting-item vertical">
                        <label>曜日ごとのデフォルト</label>
                        <div id="day-mapping-inputs" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; margin-top: 10px;"></div>
                    </div>
                </div>
                <div class="setting-item vertical">
                    <div class="textarea-header">
                        <label>5時間授業 (08:45, 09:35...)</label>
                        <div class="btn-group-small">
                            <button type="button" class="btn-small-primary" onclick="setAsCustomDefault('5')">これをデフォルトにする</button>
                            <button type="button" class="btn-small" id="restore-btn-5" onclick="restoreSchedule('5')">初期値に戻す</button>
                        </div>
                    </div>
                    <textarea id="schedule-edit-5" style="height:60px; font-size: 0.9rem;" oninput="saveSettings()"></textarea>
                </div>
                <div class="setting-item vertical">
                    <div class="textarea-header">
                        <label>6時間授業 (08:45, 09:35...)</label>
                        <div class="btn-group-small">
                            <button type="button" class="btn-small-primary" onclick="setAsCustomDefault('6')">これをデフォルトにする</button>
                            <button type="button" class="btn-small" id="restore-btn-6" onclick="restoreSchedule('6')">初期値に戻す</button>
                        </div>
                    </div>
                    <textarea id="schedule-edit-6" style="height:60px; font-size: 0.9rem;" oninput="saveSettings()"></textarea>
                </div>
            </div>

            <div class="setting-section">
                <h4 style="color: var(--countdown-color);">💣 爆発機能（動画再生機能）</h4>
                <div class="setting-item">
                    <label>機能を有効にする</label>
                    <input type="checkbox" id="bomb-enable-check" onchange="saveSettings()">
                </div>
                <div class="setting-item vertical">
                    <label>動画ファイルを選択</label>
                    <input type="file" id="video-file-input" accept="video/*">
                </div>
                <div class="setting-item vertical">
                    <label>音量調整</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" oninput="applyVolume(this.value); saveSettings();">
                </div>
                <button type="button" onclick="triggerExplosion(true)" style="width:100%; margin-top:10px; background:#333; color:white;">💥 テスト爆発(爆発機能のチェックがないと爆発しません)</button>
            </div>

            <div class="setting-section">
                <h4>🖥️ システム設定</h4>
                <div class="setting-item">
                    <label>ダークモード</label>
                    <input type="checkbox" id="darkmode-check" onchange="saveSettings()">
                </div>
                <div class="setting-item vertical">
                    <label id="size-label">表示ズーム: 100%</label>
                    <input type="range" id="size-slider" min="30" max="200" value="100" oninput="applyZoom(this.value); saveSettings();">
                </div>
                <div class="setting-item">
                    <label>時間補正 (秒)</label>
                    <input type="number" id="offset-input" step="0.1" style="width: 100px;" oninput="saveSettings()">
                </div>
                
                <div class="setting-item vertical">
                    <label>表示フォント設定</label>
                    <select id="font-preset-select" onchange="handleFontPresetChange()" style="margin-bottom: 8px;">
                        <option value="BIZ UDPGothic">BIZ UDPゴシック (標準)</option>
                        <option value="Noto Sans JP">Noto Sans JP (角ゴシック)</option>
                        <option value="Noto Serif JP">Noto Serif JP (明朝体)</option>
                        <option value="Kosugi Maru">Kosugi Maru (丸ゴシック)</option>
                        <option value="Kiwi Maru">Kiwi Maru (手書き風)</option>
                        <option value="Roboto">Roboto (洋風デジタル)</option>
                        <option value="custom">その他（直接名前を入力する）</option>
                    </select>
                    <div id="font-custom-input-container" style="display: none; width: 100%;">
                        <input type="text" id="font-custom-input" placeholder="Google Fontsの名前を入力（コピペがおすすめ）" oninput="saveSettings()">
                    </div>
                </div>
                
                <div class="setting-item">
                    <label>テーマカラー (RGB選択)</label>
                    <input type="color" id="theme-color-picker" onchange="saveSettings()">
                </div>

                <div class="setting-item">
                    <label>文字色変更</label>
                    <input type="color" id="text-color-picker" onchange="saveSettings()">
                </div>
            </div>

            <div class="setting-section">
                <h4>📄 アプリ情報とソースコード</h4>
                <div class="setting-item vertical">
                    <label style="margin-bottom: 10px;">ソースコードはGitHubで公開されています。</label>
                    <a href="https://github.com/yukkura0730/school-clock" target="_blank" rel="noopener noreferrer" class="btn-link" style="width: 100%; background: #24292e; color: white;">
                        🐙 GitHubでソースコードを見る
                    </a>
                </div>
            </div>

            <button class="btn-accent" onclick="saveSettings(); document.getElementById('settings-modal').style.display = 'none';">設定を保存して閉じる</button>
        </div>
    </div>

    <script>
        const initialSchedules = {
            "5": ["08:20", "08:30", "08:45", "09:35", "09:45", "10:35", "10:45", "11:35", "11:45", "12:35", "13:05", "13:20", "13:25", "14:15"],
            "6": ["08:30", "08:40", "08:45", "09:35", "09:45", "10:35", "10:45", "11:35", "11:45", "12:35", "13:05", "13:15", "13:25", "14:15", "14:25", "15:15"]
        };
        const dayNames = ['日','月','火','水','木','金','土'];

        let customDefaults = JSON.parse(localStorage.getItem('customDefaults')) || { ...initialSchedules };
        let schedules = JSON.parse(localStorage.getItem('customSchedules')) || { ...customDefaults };
        let dayMapping = JSON.parse(localStorage.getItem('dayMapping')) || ["6", "6", "6", "6", "6", "6", "6"];
        let currentScheduleMode = localStorage.getItem('lastManualMode') || dayMapping[new Date().getDay()];
        let timeOffset = parseFloat(localStorage.getItem('timeOffset')) || 0;
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        let isBombEnabled = localStorage.getItem('isBombEnabled') === 'true';
        let isScheduleEnabled = localStorage.getItem('isScheduleEnabled') !== 'false';
        let zoomLevel = localStorage.getItem('zoomLevel') || 100;
        let bombVolume = localStorage.getItem('bombVolume') || 1;
        
        let savedFontName = localStorage.getItem('appFontName') || "BIZ UDPGothic";
        let savedHexColor = localStorage.getItem('appHexColor') || "#00479d";
        let savedTextColor = localStorage.getItem('appTextColor') || (isDarkMode ? "#e0e0e0" : "#333333");
        
        let videoObjectURL = null;
        let lastExplodeTime = "";
        let isExplodingNow = false;
        let manualTime = 0;
        let manualTimerId = null;
        let audioCtx = null;

        const body = document.getElementById('body-tag');
        const videoInput = document.getElementById('video-file-input');
        const videoPlayer = document.getElementById('explosion-video');
        const explosionOverlay = document.getElementById('explosion-overlay');

        function initApp() { 
            applyZoom(zoomLevel); 
            applyVolume(bombVolume);
            body.classList.toggle('dark-mode', isDarkMode);
            applyFontAndColor(savedFontName, savedHexColor, isDarkMode); 
            
            document.documentElement.style.setProperty('--text-color', savedTextColor);
            
            refreshTextareas();
        }

        function refreshTextareas() {
            document.getElementById('schedule-edit-5').value = schedules["5"].join(", ");
            document.getElementById('schedule-edit-6').value = schedules["6"].join(", ");
        }

        function setAsCustomDefault(mode) {
            const area = document.getElementById(`schedule-edit-${mode}`);
            if (!area) return;
            const currentArray = area.value.split(',').map(s => s.trim()).filter(s => s);
            if (currentArray.length === 0) return;

            if (confirm(`${mode}時間授業のスケジュールを独自のデフォルト基準として保存しますか？`)) {
                customDefaults[mode] = [...currentArray];
                localStorage.setItem('customDefaults', JSON.stringify(customDefaults));
                saveSettings();
            }
        }

        function restoreSchedule(mode) {
            if (confirm(`${mode}時間授業のスケジュールを出荷時初期値（アプリ内蔵データ）に戻しますか？\n※「これをデフォルトにする」で保存したカスタムデータも消去されます。`)) {
                customDefaults[mode] = [...initialSchedules[mode]];
                schedules[mode] = [...initialSchedules[mode]];
                localStorage.setItem('customDefaults', JSON.stringify(customDefaults));
                refreshTextareas();
                saveSettings();
            }
        }

        function handleFontPresetChange() {
            const select = document.getElementById('font-preset-select');
            const container = document.getElementById('font-custom-input-container');
            const input = document.getElementById('font-custom-input');
            
            if (select.value === 'custom') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
                input.value = select.value;
                saveSettings();
            }
        }

        function applyZoom(val) {
            zoomLevel = val;
            document.documentElement.style.setProperty('--zoom-factor', val / 100);
            const label = document.getElementById('size-label');
            if (label) label.innerText = `表示ズーム: ${val}%`;
        }

        function applyVolume(val) {
            bombVolume = val;
            if (videoPlayer) videoPlayer.volume = val;
        }

        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1,3),16);
            let G = parseInt(hex.substring(3,5),16);
            let B = parseInt(hex.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
            R = (R<0)?0:R; G = (G<0)?0:G; B = (B<0)?0:B;
            const rHex = ("0"+R.toString(16)).slice(-2);
            const gHex = ("0"+G.toString(16)).slice(-2);
            const bHex = ("0"+B.toString(16)).slice(-2);
            return `#${rHex}${gHex}${bHex}`;
        }

        function applyFontAndColor(fontName, hexColor, darkActive) {
            const trimmedFont = fontName.trim();
            if (trimmedFont) {
                document.documentElement.style.setProperty('--font-family-base', `'${trimmedFont}'`);
                const presets = ["BIZ UDPGothic", "Noto Sans JP", "Noto Serif JP", "Kosugi Maru", "Kiwi Maru", "Roboto"];
                if (!presets.includes(trimmedFont)) {
                    const fontUrlName = trimmedFont.replace(/\s+/g, '+');
                    const fontLinkContainer = document.getElementById('dynamic-font-link');
                    fontLinkContainer.innerHTML = `<link href="https://fonts.googleapis.com/css2?family=${fontUrlName}:wght@400;700&display=swap" rel="stylesheet">`;
                }
            }

            let finalColor = hexColor;
            if (darkActive) {
                finalColor = adjustColorBrightness(hexColor, 50);
            }
            document.documentElement.style.setProperty('--accent-color', finalColor);
        }

        function playBeep() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine"; osc.frequency.value = 880; 
            gain.gain.setValueAtTime(bombVolume, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 1.0);
        }

        function playTimerEndSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [660, 554]; const duration = 2.5; 
            notes.forEach(freq => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = "sine"; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(bombVolume * 0.2, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            });
        }

        function triggerExplosion(withSound = false) {
            if (!isBombEnabled) return; 
            if (videoPlayer.src && videoPlayer.src.startsWith('blob:')) {
                isExplodingNow = true;
                explosionOverlay.style.display = 'flex';
                body.classList.add('is-exploding');
                videoPlayer.currentTime = 0;
                videoPlayer.play().catch(e => stopExplosion());
            } else if (withSound) {
                playBeep(); body.style.backgroundColor = "red";
                setTimeout(() => { body.style.backgroundColor = ""; }, 500);
            }
        }

        document.getElementById('video-file-input').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                if (videoObjectURL) URL.revokeObjectURL(videoObjectURL);
                videoObjectURL = URL.createObjectURL(file);
                videoPlayer.src = videoObjectURL;
                videoPlayer.load();
            }
        });

        function stopExplosion(event) {
            if (event) event.stopPropagation();
            explosionOverlay.style.display = 'none'; body.classList.remove('is-exploding');
            videoPlayer.pause(); isExplodingNow = false;
        }

        function handleBodyClick() {
            if (isExplodingNow) stopExplosion();
            else if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function setQuickTimer(min) { resetManualTimer(); manualTime = min * 60; updateManualUI(); startManualTimer(); }
        
        function startManualTimer() {
            if (manualTimerId) clearInterval(manualTimerId);
            const mIn = parseInt(document.getElementById('m-input').value) || 0;
            const sIn = parseInt(document.getElementById('s-input').value) || 0;
            if (manualTime === 0) manualTime = mIn * 60 + sIn;
            if (manualTime <= 0) return;
            body.classList.add('show-manual-timer'); body.classList.remove('show-clock', 'show-countdown');
            manualTimerId = setInterval(() => {
                manualTime--;
                if (manualTime <= 0) {
                    clearInterval(manualTimerId);
                    if (isBombEnabled) triggerExplosion(false); else playTimerEndSound();
                }
                updateManualUI();
            }, 1000);
        }

        function resetManualTimer() { clearInterval(manualTimerId); manualTime = 0; updateManualUI(); }
        function updateManualUI() {
            const m = Math.floor(manualTime / 60); const s = manualTime % 60;
            document.getElementById('manual-display').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function openSettings() { 
            document.getElementById('schedule-enable-check').checked = isScheduleEnabled; 
            document.getElementById('current-mode-select').value = currentScheduleMode; 
            document.getElementById('darkmode-check').checked = isDarkMode;
            document.getElementById('bomb-enable-check').checked = isBombEnabled;
            document.getElementById('offset-input').value = timeOffset;
            document.getElementById('size-slider').value = zoomLevel;
            document.getElementById('volume-slider').value = bombVolume;
            document.getElementById('theme-color-picker').value = savedHexColor;
            
            document.getElementById('text-color-picker').value = savedTextColor;
            
            const select = document.getElementById('font-preset-select');
            const container = document.getElementById('font-custom-input-container');
            const customInput = document.getElementById('font-custom-input');
            
            customInput.value = savedFontName;
            
            const options = Array.from(select.options).map(o => o.value);
            if (options.includes(savedFontName)) {
                select.value = savedFontName;
                container.style.display = 'none';
            } else {
                select.value = 'custom';
                container.style.display = 'block';
            }
            
            applyZoom(zoomLevel);

            const dayContainer = document.getElementById('day-mapping-inputs');
            dayContainer.innerHTML = '';
            dayNames.forEach((name, i) => {
                dayContainer.innerHTML += `<div style="text-align:center"><span style="font-size:10px">${name}</span><select id="day-${i}" style="font-size:10px; width:100%" onchange="saveSettings()"><option value="5" ${dayMapping[i]==="5"?"selected":""}>5</option><option value="6" ${dayMapping[i]==="6"?"selected":""}>6</option></select></div>`;
            });
            refreshTextareas();

            document.getElementById('settings-modal').style.display = 'flex'; 
        }

        function saveSettings() { 
            const schedCheck = document.getElementById('schedule-enable-check');
            const modeSelect = document.getElementById('current-mode-select');
            const dmCheck = document.getElementById('darkmode-check');
            const bombCheck = document.getElementById('bomb-enable-check');
            const offsetIn = document.getElementById('offset-input');
            const volIn = document.getElementById('volume-slider');
            const zoomIn = document.getElementById('size-slider');
            const colorIn = document.getElementById('theme-color-picker');
            const fontSelect = document.getElementById('font-preset-select');
            const fontCustomIn = document.getElementById('font-custom-input');
            
            const textColorIn = document.getElementById('text-color-picker');

            if(schedCheck) isScheduleEnabled = schedCheck.checked; 
            if(modeSelect) currentScheduleMode = modeSelect.value; 
            if(dmCheck) isDarkMode = dmCheck.checked;
            if(bombCheck) isBombEnabled = bombCheck.checked;
            if(offsetIn) timeOffset = parseFloat(offsetIn.value) || 0;
            if(volIn) bombVolume = volIn.value;
            if(zoomIn) zoomLevel = zoomIn.value;
            if(colorIn) savedHexColor = colorIn.value;
            
            if(textColorIn) {
                savedTextColor = textColorIn.value;
                localStorage.setItem('appTextColor', savedTextColor);
                document.documentElement.style.setProperty('--text-color', savedTextColor);
            }
            
            if (fontSelect && fontSelect.value !== 'custom') {
                savedFontName = fontSelect.value;
            } else if (fontCustomIn && fontCustomIn.value.trim()) {
                savedFontName = fontCustomIn.value.trim();
            }
            
            const area5 = document.getElementById('schedule-edit-5');
            const area6 = document.getElementById('schedule-edit-6');
            if(area5) schedules["5"] = area5.value.split(',').map(s => s.trim()).filter(s => s); 
            if(area6) schedules["6"] = area6.value.split(',').map(s => s.trim()).filter(s => s); 
            
            for(let i=0; i<7; i++) {
                const dayEl = document.getElementById(`day-${i}`);
                if(dayEl) dayMapping[i] = dayEl.value;
            }

            localStorage.setItem('isScheduleEnabled', isScheduleEnabled); 
            localStorage.setItem('customSchedules', JSON.stringify(schedules)); 
            localStorage.setItem('lastManualMode', currentScheduleMode); 
            localStorage.setItem('dayMapping', JSON.stringify(dayMapping));
            localStorage.setItem('darkMode', isDarkMode);
            localStorage.setItem('isBombEnabled', isBombEnabled);
            localStorage.setItem('timeOffset', timeOffset);
            localStorage.setItem('zoomLevel', zoomLevel);
            localStorage.setItem('bombVolume', bombVolume);
            localStorage.setItem('appFontName', savedFontName);
            localStorage.setItem('appHexColor', savedHexColor);

            body.classList.toggle('dark-mode', isDarkMode);
            applyFontAndColor(savedFontName, savedHexColor, isDarkMode);
        }

        function toggleViewMode() { const modes = ['show-clock', 'show-countdown', 'show-manual-timer']; let current = modes.findIndex(m => body.classList.contains(m)); body.classList.remove(modes[current]); body.classList.add(modes[(current + 1) % modes.length]); }
        function closeModalOutside(e) { if(e.target.id === 'settings-modal') { saveSettings(); document.getElementById('settings-modal').style.display = 'none'; } }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        function update() {
            const now = new Date();
            now.setMilliseconds(now.getMilliseconds() + (timeOffset * 1000));
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('clock-display').innerText = timeStr;
            document.getElementById('clock-sub').innerText = `現在時刻 ${timeStr}`;
            document.getElementById('date-area').innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} (${dayNames[now.getDay()]})`;

            if (isScheduleEnabled) {
                document.getElementById('schedule-label').innerText = currentScheduleMode + "時間授業モード";
                document.getElementById('schedule-label').style.color = "";
                const currentTotalSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                const activeSchedule = schedules[currentScheduleMode];
                let diffSec = -1; let targetTimeStr = "";

                if (activeSchedule) {
                    const sortedSchedule = [...activeSchedule].sort();
                    for (let t of sortedSchedule) {
                        const parts = t.split(':');
                        if (parts.length < 2) continue;
                        const targetTotal = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60;
                        if (targetTotal === currentTotalSec && lastExplodeTime !== timeStr) {
                            if (isBombEnabled) triggerExplosion(false); else playTimerEndSound(); 
                            lastExplodeTime = timeStr; 
                        }
                        if (targetTotal > currentTotalSec) { diffSec = targetTotal - currentTotalSec; targetTimeStr = t; break; }
                    }
                }

                if (diffSec >= 0) {
                    const m = Math.floor(diffSec / 60); const s = diffSec % 60;
                    const remain = `${m}:${String(s).padStart(2, '0')}`;
                    document.getElementById('timer-display').innerText = remain;
                    document.getElementById('timer-sub').innerText = `次：${targetTimeStr} (残り ${remain})`;
                    document.getElementById('next-label').innerText = `次のチャイム ${targetTimeStr}`;
                } else {
                    document.getElementById('timer-display').innerText = "終了";
                    document.getElementById('timer-sub').innerText = "本日の予定終了";
                }
            } else {
                document.getElementById('schedule-label').innerText = "オフモード（時間割無効）";
                document.getElementById('schedule-label').style.color = "#888";
                document.getElementById('timer-display').innerText = "OFF";
                document.getElementById('timer-sub').innerText = "時間割機能は停止中です";
                document.getElementById('next-label').innerText = "---";
            }
        }

        setInterval(update, 1000);
        initApp();
        update();
    </script>
</body>
</html>
