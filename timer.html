<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Timer V4.1</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕒</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #333333; --accent-color: #00479d;
            --sub-color: #666666; --countdown-color: #d32f2f; --ui-bg: rgba(128, 128, 128, 0.15);
            --modal-content-bg: #ffffff;
        }
        .dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0; --accent-color: #4da3ff;
            --sub-color: #aaaaaa; --countdown-color: #ff5252; --ui-bg: rgba(255, 255, 255, 0.1);
            --modal-content-bg: #1e1e1e;
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; font-family: 'BIZ UDPGothic', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            10% { transform: translate(-10px, -10px); }
            20% { transform: translate(10px, 10px); }
            100% { transform: translate(0,0); }
        }
        .is-exploding #main-display { animation: shake 0.1s infinite; }
        #explosion-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999; display: none; background: #000; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #explosion-video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        #main-display { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; transition: transform 0.2s ease-out; transform-origin: center; }
        .large-text { font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
        .small-text { font-weight: 700; color: var(--sub-color); margin: 10px 0; }
        #clock-view, #countdown-view, #manual-timer-view { display: none; flex-direction: column; align-items: center; }
        .show-clock #clock-view { display: flex; }
        .show-countdown #countdown-view { display: flex; }
        .show-manual-timer #manual-timer-view { display: flex; }
        #clock-display, #timer-display, #manual-display { font-size: 15rem; border-bottom: 0.05em solid var(--accent-color); }
        #timer-display, #manual-display { border-bottom: none; color: var(--countdown-color); }
        #timer-sub { font-size: 3rem; color: var(--countdown-color); }
        #clock-sub { font-size: 4rem; color: var(--sub-color); }
        #date-area { font-size: 2.5rem; margin-top: 15px; color: var(--sub-color); font-weight: 700; }
        #schedule-label { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; margin-bottom: 5px; }
        .ui-container { position: fixed; z-index: 100; display: flex; gap: 10px; }
        #controls-bottom-right { bottom: 20px; right: 20px; flex-direction: column; }
        #settings-trigger-top { top: 20px; right: 20px; }
        button { cursor: pointer; padding: 12px 18px; border-radius: 10px; border: none; background: var(--ui-bg); color: var(--text-color); font-weight: bold; font-family: inherit; }
        .btn-accent { background: var(--accent-color); color: white; margin-top: 15px; width: 100%; padding: 15px; border-radius: 10px; }
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--modal-content-bg); color: var(--text-color); padding: 25px; border-radius: 20px; width: 480px; max-height: 90vh; overflow-y: auto; position: relative; }
        .setting-section { margin-bottom: 25px; }
        .setting-section h4 { border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 15px; font-size: 16px; color: var(--accent-color); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 5px 0; }
        .setting-item.vertical { flex-direction: column; align-items: flex-start; }
        .setting-item label { font-weight: bold; font-size: 14px; }
        input[type="number"], select, textarea, input[type="file"], input[type="range"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--sub-color); background: var(--bg-color); color: inherit; box-sizing: border-box; font-family: inherit; margin-top: 5px; }
        .timer-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .quick-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .manual-inputs { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 10px; }
        .manual-inputs input { width: 90px; text-align: center; font-size: 1.8rem; border: 2px solid var(--accent-color); border-radius: 10px; }
        .highlight-box { background: rgba(0, 71, 157, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body id="body-tag" class="show-clock" onclick="handleBodyClick()">

    <div id="explosion-overlay" onclick="stopExplosion(event)">
        <video id="explosion-video" playsinline></video>
    </div>

    <div id="main-display">
        <div id="schedule-label">--</div>
        <div id="clock-view">
            <div id="clock-display" class="large-text">--:--:--</div>
            <div id="timer-sub" class="small-text">次：--:--</div>
        </div>
        <div id="countdown-view">
            <div id="next-label" class="small-text">次のチャイム --:--</div>
            <div id="timer-display" class="large-text">--:--</div>
            <div id="clock-sub" class="small-text">現在時刻 --:--:--</div>
        </div>
        <div id="manual-timer-view">
            <div id="manual-status" class="small-text">汎用タイマーモード</div>
            <div id="manual-display" class="large-text">00:00</div>
            <div class="timer-controls">
                <div class="quick-buttons">
                    <button onclick="setQuickTimer(1)">1分</button>
                    <button onclick="setQuickTimer(5)">5分</button>
                    <button onclick="setQuickTimer(10)">10分</button>
                    <button onclick="resetManualTimer()" style="background:#888; color:white;">消去</button>
                </div>
                <div class="manual-inputs">
                    <input type="number" id="m-input" placeholder="分" min="0">
                    <span>分</span>
                    <input type="number" id="s-input" placeholder="秒" min="0" max="59">
                    <span>秒</span>
                    <button onclick="startManualTimer()" style="background: var(--accent-color); color: white; padding: 10px 25px; font-size: 1.2rem;">開始</button>
                </div>
            </div>
        </div>
        <div id="date-area">----/--/-- (---)</div>
    </div>

    <div id="settings-trigger-top" class="ui-container">
        <button onclick="openSettings()">⚙️ 設定</button>
    </div>

    <div id="controls-bottom-right" class="ui-container">
        <button onclick="toggleViewMode()">🔄 表示切替</button>
        <button onclick="toggleFullScreen()">🖥️ 全画面</button>
    </div>

    <div id="settings-modal" onclick="closeModalOutside(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color: var(--accent-color);">⚙️ 環境設定</h3>
            <div class="setting-section">
                <h4>📅 学校スケジュール</h4>
                <div class="highlight-box">
                    <div class="setting-item">
                        <label>時間割機能を有効にする</label>
                        <input type="checkbox" id="schedule-enable-check">
                    </div>
                    <div class="setting-item">
                        <label>授業モード</label>
                        <select id="current-mode-select">
                            <option value="5">5時間授業</option>
                            <option value="6">6時間授業</option>
                        </select>
                    </div>
                </div>
                <div class="setting-item vertical">
                    <label>5時間授業 (カンマ区切り)</label>
                    <textarea id="schedule-edit-5" style="height:60px;"></textarea>
                </div>
                <div class="setting-item vertical">
                    <label>6時間授業 (カンマ区切り)</label>
                    <textarea id="schedule-edit-6" style="height:60px;"></textarea>
                </div>
            </div>
            <div class="setting-section">
                <h4>🖥️ 表示・システム</h4>
                <div class="setting-item">
                    <label>ダークモード</label>
                    <input type="checkbox" id="darkmode-check">
                </div>
                <div class="setting-item">
                    <label>時間補正 (秒)</label>
                    <input type="number" id="offset-input" step="0.1">
                </div>
                <div class="setting-item vertical">
                    <label>文字サイズズーム</label>
                    <input type="range" id="size-slider" min="30" max="150" value="100" oninput="applyZoom(this.value)">
                </div>
            </div>
            <div class="setting-section">
                <h4 style="color: var(--countdown-color);">💣 爆発演出</h4>
                <div class="highlight-box" style="border: 1px solid var(--countdown-color);">
                    <div class="setting-item">
                        <label>機能を有効にする</label>
                        <input type="checkbox" id="bomb-enable-check">
                    </div>
                    <div class="setting-item vertical">
                        <label>音量設定</label>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.1" oninput="applyVolume(this.value)">
                    </div>
                    <div class="setting-item vertical">
                        <label>爆発動画ファイル</label>
                        <input type="file" id="video-file-input" accept="video/*">
                    </div>
                </div>
            </div>
            <button class="btn-accent" onclick="saveSettings()">設定を保存して閉じる</button>
        </div>
    </div>

    <script>
        const defaultSchedules = {
            "5": ["08:20", "08:30", "08:45", "09:35", "09:45", "10:35", "10:45", "11:35", "11:45", "12:35", "13:05", "13:20", "13:25", "14:15"],
            "6": ["08:30", "08:40", "08:45", "09:35", "09:45", "10:35", "10:45", "11:35", "11:45", "12:35", "13:05", "13:15", "13:25", "14:15", "14:25", "15:15"]
        };
        let schedules = JSON.parse(localStorage.getItem('customSchedules')) || defaultSchedules;
        let currentScheduleMode = localStorage.getItem('lastManualMode') || "6";
        let timeOffset = parseFloat(localStorage.getItem('timeOffset')) || 0;
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        let isBombEnabled = localStorage.getItem('isBombEnabled') === 'true';
        let isScheduleEnabled = localStorage.getItem('isScheduleEnabled') !== 'false';
        let zoomLevel = localStorage.getItem('zoomLevel') || 100;
        let bombVolume = localStorage.getItem('bombVolume') || 1;
        let videoObjectURL = null;
        let lastExplodeTime = "";
        let isExplodingNow = false;
        let manualTime = 0;
        let manualTimerId = null;
        let audioCtx = null;

        const body = document.getElementById('body-tag');
        const videoInput = document.getElementById('video-file-input');
        const videoPlayer = document.getElementById('explosion-video');
        const explosionOverlay = document.getElementById('explosion-overlay');

        function initApp() { applyZoom(zoomLevel); applyVolume(bombVolume); body.classList.toggle('dark-mode', isDarkMode); }
        function playBeep() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = "sine"; osc.frequency.value = 880; gain.gain.setValueAtTime(bombVolume, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 1.0); }
        function applyZoom(val) { zoomLevel = val; document.getElementById('main-display').style.transform = `scale(${val / 100})`; }
        function applyVolume(val) { bombVolume = val; videoPlayer.volume = val; }
        function triggerExplosion(withSound = false) { if (!isBombEnabled) return; if (videoPlayer.src && videoPlayer.src.startsWith('blob:')) { isExplodingNow = true; explosionOverlay.style.display = 'flex'; body.classList.add('is-exploding'); videoPlayer.currentTime = 0; videoPlayer.play().catch(e => stopExplosion()); if (withSound) playBeep(); } else if (withSound) { playBeep(); body.style.backgroundColor = "red"; setTimeout(() => { body.style.backgroundColor = ""; }, 500); } }
        function stopExplosion(event) { if (event) event.stopPropagation(); explosionOverlay.style.display = 'none'; body.classList.remove('is-exploding'); videoPlayer.pause(); isExplodingNow = false; }
        function handleBodyClick() { if (isExplodingNow) stopExplosion(); else if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function setQuickTimer(min) { resetManualTimer(); manualTime = min * 60; updateManualUI(); startManualTimer(); }
        function startManualTimer() { if (manualTimerId) clearInterval(manualTimerId); const mIn = parseInt(document.getElementById('m-input').value) || 0; const sIn = parseInt(document.getElementById('s-input').value) || 0; if (manualTime === 0) manualTime = mIn * 60 + sIn; if (manualTime <= 0) return; body.classList.add('show-manual-timer'); body.classList.remove('show-clock', 'show-countdown'); manualTimerId = setInterval(() => { manualTime--; if (manualTime <= 0) { clearInterval(manualTimerId); triggerExplosion(true); } updateManualUI(); }, 1000); }
        function resetManualTimer() { clearInterval(manualTimerId); manualTime = 0; document.getElementById('m-input').value = ""; document.getElementById('s-input').value = ""; updateManualUI(); }
        function updateManualUI() { const m = Math.floor(manualTime / 60); const s = manualTime % 60; document.getElementById('manual-display').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`; }
        function openSettings() { document.getElementById('schedule-enable-check').checked = isScheduleEnabled; document.getElementById('current-mode-select').value = currentScheduleMode; document.getElementById('schedule-edit-5').value = schedules["5"].join(", "); document.getElementById('schedule-edit-6').value = schedules["6"].join(", "); document.getElementById('offset-input').value = timeOffset; document.getElementById('darkmode-check').checked = isDarkMode; document.getElementById('bomb-enable-check').checked = isBombEnabled; document.getElementById('size-slider').value = zoomLevel; document.getElementById('settings-modal').style.display = 'flex'; }
        function saveSettings() { isScheduleEnabled = document.getElementById('schedule-enable-check').checked; currentScheduleMode = document.getElementById('current-mode-select').value; schedules["5"] = document.getElementById('schedule-edit-5').value.split(',').map(s => s.trim()).filter(s => s); schedules["6"] = document.getElementById('schedule-edit-6').value.split(',').map(s => s.trim()).filter(s => s); timeOffset = parseFloat(document.getElementById('offset-input').value) || 0; isDarkMode = document.getElementById('darkmode-check').checked; isBombEnabled = document.getElementById('bomb-enable-check').checked; localStorage.setItem('isScheduleEnabled', isScheduleEnabled); localStorage.setItem('customSchedules', JSON.stringify(schedules)); localStorage.setItem('timeOffset', timeOffset); localStorage.setItem('darkMode', isDarkMode); localStorage.setItem('isBombEnabled', isBombEnabled); localStorage.setItem('lastManualMode', currentScheduleMode); localStorage.setItem('zoomLevel', zoomLevel); body.classList.toggle('dark-mode', isDarkMode); document.getElementById('settings-modal').style.display = 'none'; }
        function toggleViewMode() { const modes = ['show-clock', 'show-countdown', 'show-manual-timer']; let current = modes.findIndex(m => body.classList.contains(m)); body.classList.remove(modes[current]); body.classList.add(modes[(current + 1) % modes.length]); }
        function closeModalOutside(e) { if(e.target.id === 'settings-modal') saveSettings(); }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        videoInput.addEventListener('change', function() { const file = this.files[0]; if (file) { if (videoObjectURL) URL.revokeObjectURL(videoObjectURL); videoObjectURL = URL.createObjectURL(file); videoPlayer.src = videoObjectURL; videoPlayer.load(); } });

        function update() {
            const now = new Date();
            now.setMilliseconds(now.getMilliseconds() + (timeOffset * 1000));
            const timeStr = now.toTimeString().split(' ')[0];
            
            document.getElementById('clock-display').innerText = timeStr;
            document.getElementById('clock-sub').innerText = `現在時刻 ${timeStr}`;
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} (${days[now.getDay()]})`;
            document.getElementById('date-area').innerText = dateStr;

            if (isScheduleEnabled) {
                document.getElementById('schedule-label').innerText = currentScheduleMode + "時間授業モード";
                const currentTotalSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                const activeSchedule = schedules[currentScheduleMode];
                
                let diffSec = -1;
                let targetTimeStr = "";

                if (activeSchedule) {
                    // スケジュールを時間順にソート（入力ミス対策）
                    const sortedSchedule = [...activeSchedule].sort();

                    for (let t of sortedSchedule) {
                        const parts = t.split(':');
                        if (parts.length < 2) continue;
                        const targetTotal = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60;
                        
                        // 爆発判定
                        if (isBombEnabled && targetTotal === currentTotalSec && lastExplodeTime !== timeStr) {
                            triggerExplosion(false);
                            lastExplodeTime = timeStr; 
                        }
                        
                        // 「今より後の時間」の中で一番近いものを探す
                        if (targetTotal > currentTotalSec) {
                            diffSec = targetTotal - currentTotalSec;
                            targetTimeStr = t;
                            break;
                        }
                    }
                }

                if (diffSec >= 0) {
                    const m = Math.floor(diffSec / 60); const s = diffSec % 60;
                    const remain = `${m}:${String(s).padStart(2, '0')}`;
                    document.getElementById('timer-display').innerText = remain;
                    document.getElementById('timer-sub').innerText = `次：${targetTimeStr} (残り ${remain})`;
                    document.getElementById('next-label').innerText = `次のチャイム ${targetTimeStr}`;
                } else {
                    document.getElementById('timer-display').innerText = "--:--";
                    document.getElementById('timer-sub').innerText = "本日の予定終了";
                    document.getElementById('next-label').innerText = "予定終了";
                }
            } else {
                document.getElementById('schedule-label').innerText = "時間割オフ";
                document.getElementById('timer-display').innerText = "OFF";
            }
        }

        setInterval(update, 1000);
        initApp();
        update();
    </script>
</body>
</html>
